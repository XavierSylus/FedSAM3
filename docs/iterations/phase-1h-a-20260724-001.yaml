acceptance_tests:
  - absent groups are marked not_present without fabricated parameter counts
  - a real optimizer group with all grad None or no finite nonzero gradient fails
  - nonzero delta without upload fails
  - restricted aggregation never marks a modality-disallowed client eligible or aggregated
  - unrestricted aggregation records all active clients as parameter eligible, including zero-update dilution
