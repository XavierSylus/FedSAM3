    - accumulate unique parameters with grad is not None and finite nonzero gradient before optimizer zero_grad
    - compute upload deltas and derive server eligibility/aggregation from the audit
  output:
    - per-client, per-group effectiveness record retained in training history and JSONL
side_effects:
