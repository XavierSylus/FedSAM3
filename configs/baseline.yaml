# ===============================================================
# FedSAM3-Cream Group B 配置
# 传统多模态联邦：ImageOnly + Multimodal，文本编码器直接参与 FedAvg 聚合
# 目的：证明"文本污染"现象（文本权重污染纯图像分割头）
# ===============================================================


# 数据配置
data_root: data/federated_split  # 数据根目录

# ===== 联邦学习客户端配置 =====
federated:
  # 客户端配置列表
  clients:
    # Client 2: BraTS 2018 影像数据 (image_only)
    - client_id: client2
      modality: image_only
      data_source: data/federated_split/client2_image_only/dataset.json
      enabled: true

    # Client 3: BraTS 2020 成对数据 (multimodal)
    - client_id: client3
      modality: multimodal
      data_source: data/federated_split/client3_multimodal/dataset.json
      enabled: true

  # ⚠️ Baseline 不使用解耦聚合
  use_decoupled_agg: false

# ===== 训练基础参数 =====
training:
  batch_size: 1  # Batch Size 设为 1
  learning_rate: 0.0002  # 2e-4
  rounds: 50  # 联邦学习总轮数
  local_epochs: 1  # 客户端本地训练轮数
  weight_decay: 0.01  # AdamW 权重衰减
  grad_clip: 1.0  # 梯度裁剪阈值

# ===== CreamFL 对比学习参数 =====
cream:
  lambda_cream: 0.0  # Group B 不启用对比蒸馏，暴露纯 FedAvg 聊合的文本污染效果
  tau: 0.07

# ===== 模型参数 =====
model:
  img_size: 256  # 输入图像尺寸
  embed_dim: 768  # ViT-Base: 768
  decoder_dim: 256
  num_classes: 3
  adapter_skip: 64

# ===== 服务器聚合参数 =====
server:
  aggregation_method: fedavg  # Group B：朴素 FedAvg，文本编码器权重直接平均进 client2
  global_rep_alpha: 0.9

# ===== 训练选项 =====
options:
  use_amp: true  # ✅ 开启混合精度训练 (AMP)
  use_dummy: false  # 使用真实 SAM3 权重
  verbose_sanity_check: false  # 关闭冗余的 Sanity Check 日志

# ===== 日志记录配置 =====
logging:
  log_type: tensorboard
  log_dir: logs/group_b
  experiment_name: FedSAM3_GroupB_TextPollution
  wandb_project: FedSAM3-Cream
  wandb_entity: null
  log_interval: 1  # 每轮记录一次日志

# ===== 设备配置 =====
device: cuda  # cuda | cpu

# ===== 检查点配置 =====
checkpoint:
  checkpoint_interval: 5  # 每 5 轮保存一次检查点
  resume_from_checkpoint: null  # 检查点路径（恢复训练时填写）
  keep_checkpoint_max: 10  # 保留最近 10 个检查点
  save_best_model: true  # 额外保存验证集最佳模型
  save_final_model: true  # 训练结束时保存最终模型

# ===== 验证与评估配置 =====
validation:
  val_interval: 5  # 每 5 轮验证一次
  save_masks: true  # 保存分割掩码用于可视化
  max_masks: 100  # 最多保存 100 个掩码样本

# ===== 数据增强 =====
augmentation:
  random_flip: true  # 随机水平/垂直翻转
  random_rotation: false  # 随机旋转（医学影像通常不建议）
  random_crop: false  # 随机裁剪
  color_jitter: false  # 颜色抖动（医学影像不推荐）

# ===== 系统优化配置 =====
system:
  num_workers: 4  # DataLoader 的 worker 数量
  pin_memory: true  # 锁页内存（加速数据传输）
  persistent_workers: true  # 保持 worker 进程存活
