# ===============================================================
# FedSAM3-Cream Group C 配置
# 解耦蒸馏联邦：ImageOnly + Multimodal，文本仅走对比蒸馏通道，不参与分割头聚合
# 目的：证明解耦蒸馏的有效性
# ===============================================================


# 数据配置
data_root: data/federated_split  # 数据根目录

# ===== 联邦学习客户端配置 =====
federated:
  # 客户端配置列表（包含所有 3 个异构客户端）
  clients:
    # Client 2: BraTS 2018 影像数据 (image_only)
    - client_id: client_2
      modality: image_only
      data_source: data/federated_split/client2_image_only/dataset.json
      enabled: true

    # Client 3: BraTS 2020 成对数据 (multimodal)
    - client_id: client_3
      modality: multimodal
      data_source: data/federated_split/client3_multimodal/dataset.json
      enabled: true

  # ✅ 提出方法：使用解耦功能聚合
  # Decoupled Aggregation Rules:
  #   - mask_decoder: 仅聚合 Client 2 (image_only) 和 Client 3 (multimodal)
  #   - text_encoder: 仅聚合 Client 1 (text_only) 和 Client 3 (multimodal)
  #   - adapter: 全员聚合（确保跨模态对齐）
  use_decoupled_agg: true

# ===== 训练基础参数 =====
training:
  batch_size: 1  # Batch Size 设为 1
  learning_rate: 0.0002  # 2e-4
  rounds: 50  # 联邦学习总轮数
  local_epochs: 1  # 客户端本地训练轮数
  weight_decay: 0.01  # AdamW 权重衰减
  grad_clip: 1.0  # 梯度裁剪阈值

# ===== CreamFL 对比学习参数 =====
cream:
  lambda_cream: 0.02  # ★ Fix: 0.1 → 0.02，让 seg_loss 主导
  tau: 0.07  # 温度参数

# ===== 模型参数 =====
model:
  img_size: 256  # 输入图像尺寸
  embed_dim: 768  # ViT-Base: 768
  decoder_dim: 256
  num_classes: 1
  adapter_skip: 64
  # ✨ 启用多模态文本融合（关键配置）
  use_fusion: true  # 启用 GatedFusion 模块
  text_dim: 768  # 文本特征维度（匹配 BERT/PubMedBERT 的 768维输出）
  fusion_hidden_dim: 256  # 融合模块隐藏层维度

# ===== 服务器聚合参数 =====
server:
  aggregation_method: contrastive_weighted  # contrastive_weighted | similarity_weighted | fedavg
  global_rep_alpha: 0.9  # 全局表示 EMA 系数

# ===== 训练选项 =====
options:
  use_amp: true  # ✅ 开启混合精度训练 (AMP)
  use_dummy: false  # 使用真实 SAM3 权重
  verbose_sanity_check: false  # 关闭冗余的 Sanity Check 日志

# ===== 日志记录配置 =====
logging:
  log_type: tensorboard
  log_dir: logs/group_c
  experiment_name: FedSAM3_GroupC_DecoupledDistillation
  wandb_project: FedSAM3-Cream
  wandb_entity: null
  log_interval: 1  # 每轮记录一次日志

# ===== 设备配置 =====
device: cuda  # cuda | cpu

# ===== 检查点配置 =====
checkpoint:
  checkpoint_interval: 5  # 每 5 轮保存一次检查点
  resume_from_checkpoint: null  # 检查点路径（恢复训练时填写）
  keep_checkpoint_max: 10  # 保留最近 10 个检查点
  save_best_model: true  # 额外保存验证集最佳模型
  save_final_model: true  # 训练结束时保存最终模型

# ===== 验证与评估配置 =====
validation:
  val_interval: 5  # 每 5 轮验证一次
  save_masks: true  # 保存分割掩码用于可视化
  max_masks: 100  # 最多保存 100 个掩码样本

# ===== 数据增强 =====
augmentation:
  random_flip: true  # 随机水平/垂直翻转
  random_rotation: false  # 随机旋转（医学影像通常不建议）
  random_crop: false  # 随机裁剪
  color_jitter: false  # 颜色抖动（医学影像不推荐）

# ===== 系统优化配置 =====
system:
  num_workers: 4  # DataLoader 的 worker 数量
  pin_memory: true  # 锁页内存（加速数据传输）
  persistent_workers: true  # 保持 worker 进程存活

# ===== 实验说明 =====
# 本配置文件用于验证我们提出的解耦功能聚合方法：
# 1. 异构客户端场景：支持 text_only, image_only, multimodal 三种模态
# 2. 解耦聚合策略：
#    - 分割头（mask_decoder）只聚合有影像的客户端
#    - 文本编码器（text_encoder）只聚合有文本的客户端
#    - 适配器（adapter）全员聚合以保持跨模态对齐
# 3. 预期效果：相比 baseline，能更好地利用异构数据，提升分割性能
