server_name: sam3-model-builder

# 输入参数定义
inputs:
  action: str  # 操作类型: 'build_image', 'build_video', 'build_tracker', 'download_ckpt'
  model_type: str  # 模型类型: 'image', 'video', 'tracker' (当action为build_*时使用)
  
  # 通用参数
  device: str  # 设备: 'cuda' 或 'cpu'
  
  # 图像模型参数
  bpe_path: str  # BPE tokenizer路径（可选）
  eval_mode: bool  # 是否设置为评估模式（默认: true）
  checkpoint_path: str  # 检查点路径（可选）
  load_from_HF: bool  # 是否从HuggingFace加载（默认: true）
  enable_segmentation: bool  # 是否启用分割头（默认: true）
  enable_inst_interactivity: bool  # 是否启用实例交互（默认: false）
  compile: bool  # 是否编译模型（默认: false）
  
  # 视频模型参数
  has_presence_token: bool  # 是否有presence token（默认: true）
  geo_encoder_use_img_cross_attn: bool  # 几何编码器是否使用图像交叉注意力（默认: true）
  strict_state_dict_loading: bool  # 是否严格加载状态字典（默认: true）
  apply_temporal_disambiguation: bool  # 是否应用时间消歧（默认: true）
  
  # 跟踪器参数
  with_backbone: bool  # 是否包含backbone（默认: false）

# 输出结果定义
outputs:
  status: str  # 操作状态: 'success' 或 'error'
  model_type: str  # 模型类型（如果构建了模型）
  model_info: dict  # 模型信息字典
  device: str  # 使用的设备
  checkpoint_path: str  # 下载的检查点路径（当action为download_ckpt时）
  message: str  # 消息（可选）
  error: str  # 错误信息（如果status为error）
